---
# Configuration Example: Automatic API Version Detection
#
# Use this configuration when:
# - You want the exporter to automatically detect the NetBackup API version
# - You're deploying across multiple NetBackup versions
# - You want a single configuration that works with NetBackup 10.0, 10.5, and 11.x
# - You're upgrading NetBackup and want the exporter to adapt automatically
#
# NetBackup Version: 10.0+ (any supported version)
# API Version: Auto-detected (14.0 → 13.0 → 12.0 → 10.0)
# Detection: Enabled (no apiVersion specified)

server:
    host: "localhost"
    port: "9440"
    uri: "/metrics"
    scrapingInterval: "1h"   # Job lookback window per collection
    collectionInterval: "5m" # How often the loop polls every site (default 5m)
    logName: "log/nbu-exporter.log"

nbuservers:
    - site: "primary"
      scheme: "https"
      uri: "/netbackup"
      host: "nbu-master.my.domain"
      port: "1556"
      # apiVersion: NOT SPECIFIED — auto-detects highest supported version
      # Detection order: 14.0 (NBU 11.2) → 13.0 (NBU 11.0) → 12.0 (NBU 10.5) → 10.0 (NBU 10.0-10.4)
      apiKey: "your-api-key-here"
      insecureSkipVerify: false

# Optional: opt-in metric collectors (all default to disabled).
# alerts/malware/catalog/slo require NetBackup 11.2 (API version 14.0).
collectors:
    alerts:  { enabled: false }
    malware: { enabled: false }
    catalog: { enabled: false }
    slo:     { enabled: false }
    # Tape drives, media pools, partially-full volume pools and disk-pool volumes.
    # Drive/media metrics work on NBU 10.0+; volume-pool and disk-pool need 10.5+.
    tape:    { enabled: false }
    # Per-client backup compliance + lifecycle (BACKUP/DUPLICATION/IMPORT).
    # An empty allowlist emits nothing.
    perClient:
        enabled: false
        allowlist: []

# Notes:
# - For contiguous job coverage, keep scrapingInterval >= collectionInterval.
# - Detection adds ~1 s per version attempt to startup time.
#   For faster startup, pin apiVersion explicitly.
# - Keep insecureSkipVerify: false in production.
