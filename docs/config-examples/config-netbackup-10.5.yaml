---
# Configuration Example: NetBackup 10.5 with Explicit API Version 12.0
#
# Use this configuration when:
# - Running NetBackup 10.5
# - You want to explicitly specify API version 12.0
# - You want to skip automatic version detection for faster startup
#
# NetBackup Version: 10.5
# API Version: 12.0
# Detection: Disabled (explicit version)

server:
    host: "localhost"
    port: "9440"
    uri: "/metrics"
    scrapingInterval: "1h"   # Job lookback window per collection
    collectionInterval: "5m" # How often the loop polls every site (default 5m)
    logName: "log/nbu-exporter.log"

nbuservers:
    - site: "primary"
      scheme: "https"
      uri: "/netbackup"
      host: "nbu10-master.my.domain"
      port: "1556"
      apiVersion: "12.0"   # Explicit API version for NetBackup 10.5
      apiKey: "your-api-key-here"
      insecureSkipVerify: false

# Optional: opt-in metric collectors unlocked by NetBackup 10.5 (API 12.0).
collectors:
    tape:    { enabled: true }   # Drives, media pools, disk-pool volumes
    perClient:
        enabled: false
        allowlist: []            # exact client names, e.g. ["db01", "app02"]

# Notes:
# - NetBackup 10.5 adds tape drives, media pools, partially-full volume pools,
#   disk-pool volumes, dedup ratio, and queue-reason codes.
# - Set collectors.tape.enabled: true to expose tape infrastructure metrics.
# - Keep insecureSkipVerify: false in production.
