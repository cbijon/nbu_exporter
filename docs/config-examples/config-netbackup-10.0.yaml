---
# Configuration Example: NetBackup 10.0-10.4 with Explicit API Version 10.0
#
# Use this configuration when:
# - Running NetBackup 10.0, 10.1, 10.2, 10.3, or 10.4
# - You want to explicitly specify API version 10.0
# - You want to skip automatic version detection for faster startup
#
# NetBackup Version: 10.0 - 10.4
# API Version: 10.0
# Detection: Disabled (explicit version)

server:
    host: "localhost"
    port: "9440"
    uri: "/metrics"
    scrapingInterval: "1h"   # Job lookback window per collection
    collectionInterval: "5m" # How often the loop polls every site (default 5m)
    logName: "log/nbu-exporter.log"

nbuservers:
    - site: "primary"
      scheme: "https"
      uri: "/netbackup"
      host: "nbu10-legacy.my.domain"
      port: "1556"
      apiVersion: "10.0"   # Explicit API version for NetBackup 10.0-10.4
      apiKey: "your-api-key-here"
      insecureSkipVerify: false

# Notes:
# - Core metrics (jobs, storage) work the same across all API versions.
# - Tape infrastructure metrics, dedup ratio, and disk-pool state
#   are only available from NetBackup 10.5+ (API 12.0).
# - Consider upgrading to NetBackup 10.5+ for full metric coverage.
# - Keep insecureSkipVerify: false in production.
