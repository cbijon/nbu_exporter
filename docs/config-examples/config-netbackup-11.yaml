---
# Configuration Example: NetBackup 11.0 with Explicit API Version 13.0
#
# Use this configuration when:
# - Running NetBackup 11.0
# - You want to explicitly specify API version 13.0
# - You want to skip automatic version detection for faster startup
#
# NetBackup Version: 11.0
# API Version: 13.0
# Detection: Disabled (explicit version)
#
# For NetBackup 11.2, use apiVersion: "14.0" to enable additional collectors
# (alerts, malware, catalog, slo).

server:
    host: "localhost"
    port: "9440"
    uri: "/metrics"
    scrapingInterval: "1h"   # Job lookback window per collection
    collectionInterval: "5m" # How often the loop polls every site (default 5m)
    logName: "log/nbu-exporter.log"

nbuservers:
    - site: "primary"
      scheme: "https"
      uri: "/netbackup"
      host: "nbu11-master.my.domain"
      port: "1556"
      apiVersion: "13.0"   # Explicit API version for NetBackup 11.0
      apiKey: "your-api-key-here"
      insecureSkipVerify: false

# Optional: opt-in metric collectors available from NetBackup 10.5+.
# alerts/malware/catalog/slo require NetBackup 11.2 (API version 14.0).
collectors:
    tape:    { enabled: true }
    perClient:
        enabled: false
        allowlist: []   # exact client names, e.g. ["db01", "app02"]

# Notes:
# - Replace host and apiKey placeholders with your real values.
# - Keep insecureSkipVerify: false in production.
