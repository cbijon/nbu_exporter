---
server:
  host: "localhost"
  port: "9440"
  uri: "/metrics"
  scrapingInterval: "1h"
  # "stdout" (also "" or "-") logs to stdout only — ideal for containers
  # (captured by `docker logs`), systemd/journald, and Kubernetes. Set a file
  # path (e.g. "/var/log/nbu_exporter/nbu-exporter.log") to also write a file;
  # its parent directory must already exist and be writable.
  logName: "stdout"

# nbuservers: is the current format. One entry per NetBackup primary server.
# The `site` value becomes a label on every metric emitted for that server.
# Legacy `nbuserver:` (single block) still works but triggers a deprecation warning.
#
# host and apiKey support ${ENV_VAR} interpolation — set values in a .env file
# (gitignored) and reference them here. Literal values also work.
nbuservers:
  - site: "primary"
    scheme: "https"
    uri: "/netbackup"
    host: "${NBU1_HOSTNAME}"
    port: "1556"
    # apiVersion: "10.0"  # Optional: pin to a specific version (10.0 / 12.0 / 13.0 / 14.0)
    # If omitted, auto-detects the highest supported version (14.0 → 13.0 → 12.0 → 10.0)
    apiKey: "${NBU1_APIKEY}"
    insecureSkipVerify: false  # Set to true only for testing environments

# Optional: OpenTelemetry distributed tracing configuration
# Enables distributed tracing for NetBackup API calls and Prometheus scrape cycles.
# Useful for diagnosing slow scrapes and identifying performance bottlenecks.
opentelemetry:
  enabled: false
  # OTLP gRPC endpoint (Jaeger, Tempo, OTel Collector…)
  endpoint: "localhost:4317"
  insecure: true
  # Sampling rate: 1.0 = trace everything, 0.1 = 10%, 0.01 = 1%
  samplingRate: 0.1

# Optional: opt-in metric collectors (all default to disabled).
# alerts/malware/catalog/slo require NetBackup 11.2 (API version 14.0).
collectors:
  alerts:  { enabled: false }
  malware: { enabled: false }
  catalog: { enabled: false }
  slo:     { enabled: false }
  # Tape drives, media pools, partially-full volume pools and disk-pool volumes.
  # Drive/media metrics work on NBU 10.0+; volume-pool and disk-pool need 10.5+.
  tape:    { enabled: false }
  # Per-client backup compliance + lifecycle (BACKUP/DUPLICATION/IMPORT).
  # The client label is high-cardinality; an empty allowlist emits nothing.
  perClient:
    enabled: false
    allowlist: []   # exact client names, e.g. ["db01", "app02"]
