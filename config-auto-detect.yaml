---
# Configuration with automatic API version detection.
# The exporter tries versions in order: 14.0 → 13.0 → 12.0 → 10.0
# and uses the first one the server accepts.
server:
  host: "localhost"
  port: "9440"
  uri: "/metrics"
  scrapingInterval: "1h"
  logName: "stdout"

nbuservers:
  - site: "primary"
    scheme: "https"
    uri: "/netbackup"
    host: "master.my.domain"
    port: "1556"
    # apiVersion: omitted — auto-detects highest supported version
    apiKey: "my-api-key"
    insecureSkipVerify: false

# Optional: OpenTelemetry distributed tracing
# opentelemetry:
#   enabled: true
#   endpoint: "localhost:4317"
#   insecure: true
#   samplingRate: 0.1

# Optional: opt-in metric collectors (all default to disabled).
# alerts/malware/catalog/slo require NetBackup 11.2 (API version 14.0).
collectors:
  alerts:  { enabled: false }
  malware: { enabled: false }
  catalog: { enabled: false }
  slo:     { enabled: false }
  # Tape drives, media pools, partially-full volume pools and disk-pool volumes.
  # Drive/media metrics work on NBU 10.0+; volume-pool and disk-pool need 10.5+.
  tape:    { enabled: false }
  # Per-client backup compliance + lifecycle (BACKUP/DUPLICATION/IMPORT).
  # An empty allowlist emits nothing.
  perClient:
    enabled: false
    allowlist: []
